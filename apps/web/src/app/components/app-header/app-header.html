<nav class="navbar navbar-expand-lg bon-navbar">
  <div class="container-xl">
    <!-- Brand -->
    <a class="navbar-brand bon-brand" [routerLink]="['/']" (click)="closeNav()">
      <img src="/bon-logo.png" alt="Bank of Namibia" class="bon-brand__logo" />
      <div class="bon-brand__copy">
        <span class="bon-brand__eyebrow">Bank of Namibia</span>
        <strong class="bon-brand__name">Instant Payment Namibia</strong>
      </div>
    </a>

    <!-- Mobile toggler -->
    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleNav()"
      [attr.aria-expanded]="navOpen()"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Collapsible section -->
    <div class="navbar-collapse" [class.show]="navOpen()">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item" *ngFor="let item of navItems">
          <a
            class="nav-link bon-nav-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.route === '/' }"
            (click)="closeNav()"
          >
            {{ item.label }}
          </a>
        </li>
      </ul>

      <!-- User menu -->
      <div class="user-menu-wrap">
        <button class="user-trigger" type="button" (click)="toggleUserMenu()">
          <span class="user-avatar">{{ user.initials }}</span>
          <span class="user-name d-none d-lg-inline">{{ user.name }}</span>
          <svg class="user-chevron" [class.rotated]="userMenuOpen()" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 5L7 9L11 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <div class="user-dropdown" *ngIf="userMenuOpen()">
          <div class="user-dropdown__header">
            <span class="user-avatar user-avatar--lg">{{ user.initials }}</span>
            <div class="user-dropdown__info">
              <strong>{{ user.name }}</strong>
              <small>{{ user.role }}</small>
            </div>
          </div>
          <hr class="user-dropdown__divider" />
          <a class="user-dropdown__item" [routerLink]="['/developer']" (click)="closeNav()">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M5 4L2 7.5L5 11M10 4L13 7.5L10 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            API &amp; Developer
          </a>
          <a class="user-dropdown__item" href="/api/docs" target="_blank" rel="noreferrer">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <rect x="2.5" y="2.5" width="10" height="10" rx="1.2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 6h5M5 8.5h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            API Documentation
          </a>
          <a class="user-dropdown__item" [routerLink]="['/support']" (click)="closeNav()">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M7.5 5.5v3M7.5 10h.01" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            Support
          </a>
        </div>
      </div>
    </div>
  </div>
</nav>
